name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: Build · SSOT guards
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Finance recovery SSOT guard
        run: bash scripts/check-finance-recovery-ssot.sh

      - name: Finance payout SSOT parity guard
        run: bash scripts/check-finance-payout-ssot-parity.sh

      - name: SSOT unit tests
        run: npx vitest run src/lib/__tests__/digitalFinanceSSOT.test.ts src/lib/__tests__/tripCaptureStatus.test.ts

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          VITE_SUPABASE_URL: https://thazislrdkjpvvghtvzo.supabase.co
